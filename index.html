<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Travel Generator</title>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Travel Itinerary</h1>
      </header>
      <main>
        <form id="travel-form">
          <input
            type="text"
            placeholder="Enter a city..."
            required
            class="city-input"
            id="city-input"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="itinerary" id="itinerary">
          'travel itinerary shown here'
        </div>
      </main>
      <footer>
        This AI project is coded by
        <a
          href="https://github.com/duff-e"
          target="_blank"
          rel="noopener noreferrer"
        >
          Elise Duffy</a
        >
        and is open sourced on
        <a
          href="https://github.com/duff-e/AI-Travel-Itinerary"
          target="_blank"
          rel="noopener noreferrer"
        >
          Github</a
        >
        and hosted on
        <a
          href="https://travelgenerator-ai.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Netlify</a
        >
      </footer>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
