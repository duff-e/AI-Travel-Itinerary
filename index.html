<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Travel Generator</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Manrope:wght@200..800&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Travel Itinerary</h1>
      </header>
      <main>
        <form id="travel-form">
          <input
            type="text"
            placeholder="Enter a city..."
            required
            class="city-input"
            id="city-input"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="itinerary hidden" id="itinerary">
          Your travel plans await!
          <img src="banner.png" alt="" />
        </div>
      </main>
      <footer>
        This AI project is coded by
        <a
          href="https://github.com/duff-e"
          target="_blank"
          rel="noopener noreferrer"
        >
          Elise Duffy</a
        >
        and is open sourced on
        <a
          href="https://github.com/duff-e/AI-Travel-Itinerary"
          target="_blank"
          rel="noopener noreferrer"
        >
          Github</a
        >
        and hosted on
        <a
          href="https://travelgenerator-ai.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Netlify</a
        >
      </footer>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
